name: Bug report
description: Report a problem with a Dflow command, generated file, or documented workflow.
title: "[Bug]: "
labels:
  - bug
body:
  - type: input
    id: dflow-version
    attributes:
      label: Dflow version
      description: Run `npx dflow-sdd-ddd --version` or note the package version you used.
      placeholder: "0.1.1"
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Run `node --version`.
      placeholder: "v22.22.1"
    validations:
      required: true
  - type: dropdown
    id: track
    attributes:
      label: Project track
      options:
        - Greenfield
        - Brownfield
        - Not sure
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command or workflow
      description: Paste the command or `/dflow:*` workflow you were using.
      placeholder: "npx dflow-sdd-ddd init"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect Dflow to do?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead? Include relevant output if possible.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: List the smallest steps that reproduce the issue.
      placeholder: |
        1. Create an empty project directory
        2. Run ...
        3. Select ...
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots, generated file snippets, or environment details if useful.
